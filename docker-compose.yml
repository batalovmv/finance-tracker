services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-tracker-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance_dev
      POSTGRES_DB: finance_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance -d finance_tracker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
